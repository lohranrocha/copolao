services:
  - type: web
    name: copolao-api
    runtime: node
    plan: free
    buildCommand: npm run prisma:generate --workspace backend && npm run build --workspace backend
    startCommand: npm run prisma:migrate:deploy --workspace backend && npm run start --workspace backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: PAYMENT_PROVIDER
        value: mock
      - key: REGISTRATION_PRICE_CENTS
        value: 2000
      - key: PUBLIC_API_URL
        sync: false
      - key: ASAAS_API_URL
        value: https://api-sandbox.asaas.com/v3
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false

  - type: web
    name: copolao-web
    runtime: static
    plan: free
    buildCommand: npm run build --workspace frontend
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        sync: false
