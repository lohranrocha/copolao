services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao-copa-postgres
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
      POSTGRES_DB: bolao_copa
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_copa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
